# fly.toml file generated for booking-zhouhaixian on 2023-01-15T21:49:10+08:00

app = "booking-zhouhaixian"
kill_signal = "SIGINT"
kill_timeout = 5
processes = []

[env]
  NODE_OPTIONS = "--max-old-space-size=8192"

[experimental]
  auto_rollback = true

[[services]]
  http_checks = []
  internal_port = 3000
  processes = ["app"]
  protocol = "tcp"
  script_checks = []
  [services.concurrency]
    hard_limit = 25
    soft_limit = 20
    type = "connections"

  [[services.ports]]
    force_https = true
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.tcp_checks]]
    grace_period = "1s"
    interval = "15s"
    restart_limit = 0
    timeout = "2s"
